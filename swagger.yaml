openapi: 3.0.3
info:
  title: GPP Plataforma 2.0 — API
  version: 2.0.0
  description: |
    ## Bem-vindo à API da Plataforma GPP 2.0

    Esta documentação descreve todos os endpoints da API REST da Plataforma GPP 2.0.

    ---

    ## 🔐 Como autenticar

    Todos os endpoints (exceto os da seção **0 - Autenticação**) exigem uma sessão ativa. Siga os passos abaixo antes de usar qualquer outro método:

    1. Localize a seção **0 - Autenticação** no menu
    2. Abra o endpoint **POST /api/accounts/login/**
    3. Clique em **Try it out**
    4. Preencha o body com suas credenciais:

    ```json
    {
      "username": "seu.usuario",
      "password": "sua_senha",
      "app_context": "PORTAL"
    }
    ```

    5. Clique em **Execute**
    6. Aguarde o retorno **200 OK** — a sessão será criada automaticamente no browser
    7. A partir deste momento, todos os endpoints estarão disponíveis nesta aba

    > ⚠️ **Importante:** o login deve ser feito diretamente nesta página do Swagger. Sessões criadas externamente (Postman, scripts) não são compartilhadas com o browser.

    ---

    ## 🍪 Mecanismo de autenticação

    A API utiliza **SessionAuthentication** com cookies HttpOnly por aplicação. O nome do cookie varia conforme o `app_context` usado no login: `gpp_session_PORTAL`, `gpp_session_CARGA_ORG_LOT`, `gpp_session_ACOES_PNGI`, etc. O browser envia o cookie correto automaticamente em todas as requisições desta aba.

    ---

    ## 📋 Estrutura dos módulos

    | Seção | Descrição |
    |---|---|
    | **0 - Autenticação** | Login, logout e resolução de usuário |
    | **1 - Usuários** | Perfis, roles, permissões e overrides |
    | **2 - Portal** | Dashboard e aplicações visíveis no portal |
    | **3 - Ações PNGI** | Ações, prazos, anotações e destaques |
    | **4 - Carga Org/Lot** | Carga de organogramas e loteamentos |
    | **5 - Utilitários** | Health check e logs de frontend |
paths:
  /api/accounts/aplicacoes/:
    get:
      operationId: accounts_aplicacoes_list
      description: |-
        GET /api/accounts/aplicacoes/
        GET /api/accounts/aplicacoes/{idaplicacao}/

        Endpoint AUTENTICADO — pós-login.
        Retorna as aplicações visíveis ao usuário conforme seu perfil:
          - PORTAL_ADMIN / SuperUser: todas as apps sem restrição.
          - Usuário comum: apenas apps onde possui UserRole,
            filtradas por isappbloqueada=False e isappproductionready=True.

        R-01: ReadOnly — POST/PUT/PATCH/DELETE retornam 405.
        R-02: Ordenação alfabética por nomeaplicacao.
        R-03: pagination_class = None — retorna lista plana sem envelope de paginação.
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Aplicacao'
          description: ''
  /api/accounts/aplicacoes/{idaplicacao}/:
    get:
      operationId: accounts_aplicacoes_retrieve
      description: |-
        GET /api/accounts/aplicacoes/
        GET /api/accounts/aplicacoes/{idaplicacao}/

        Endpoint AUTENTICADO — pós-login.
        Retorna as aplicações visíveis ao usuário conforme seu perfil:
          - PORTAL_ADMIN / SuperUser: todas as apps sem restrição.
          - Usuário comum: apenas apps onde possui UserRole,
            filtradas por isappbloqueada=False e isappproductionready=True.

        R-01: ReadOnly — POST/PUT/PATCH/DELETE retornam 405.
        R-02: Ordenação alfabética por nomeaplicacao.
        R-03: pagination_class = None — retorna lista plana sem envelope de paginação.
      parameters:
      - in: path
        name: idaplicacao
        schema:
          type: integer
        description: Um valor inteiro único que identifica este Aplicação.
        required: true
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Aplicacao'
          description: ''
  /api/accounts/auth/aplicacoes/:
    get:
      operationId: accounts_auth_aplicacoes_list
      description: |-
        GET /api/accounts/auth/aplicacoes/
        GET /api/accounts/auth/aplicacoes/{codigointerno}/

        Endpoint PÚBLICO — sem autenticação necessária.
        Usado pelo frontend para popular o seletor de app_context na tela de login.

        Retorna apenas apps ativas (não bloqueadas e prontas para produção).
        Expõe somente idaplicacao, codigointerno e nomeaplicacao — sem vazar flags internos.

        R-01: ReadOnly — POST/PUT/PATCH/DELETE retornam 405.
        R-02: Filtro fixo: isappbloqueada=False AND isappproductionready=True.
        R-03: pagination_class = None — retorna lista plana sem envelope de paginação.
        R-04: throttle_classes = [] — endpoint público de leitura; sem rate limit.
      tags:
      - 5 - Utilitários
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AplicacaoPublica'
          description: ''
  /api/accounts/auth/aplicacoes/{codigointerno}/:
    get:
      operationId: accounts_auth_aplicacoes_retrieve
      description: |-
        GET /api/accounts/auth/aplicacoes/
        GET /api/accounts/auth/aplicacoes/{codigointerno}/

        Endpoint PÚBLICO — sem autenticação necessária.
        Usado pelo frontend para popular o seletor de app_context na tela de login.

