        R-03: pagination_class = None — retorna lista plana sem envelope de paginação.
        R-04: throttle_classes = [] — endpoint público de leitura; sem rate limit.
      parameters:
      - in: path
        name: codigointerno
        schema:
          type: string
        required: true
      tags:
      - 5 - Utilitários
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AplicacaoPublica'
          description: ''
  /api/accounts/auth/resolve-user/:
    post:
      operationId: accounts_auth_resolve_user_create
      description: Recebe um identificador (email ou username) e retorna o username
        canônico. Usado pelo frontend antes do login.
      summary: Resolve username a partir de email ou username
      tags:
      - 0 - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  example: joao@gov.br
              required:
              - identifier
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          description: 'Username resolvido: { ''username'': ''...'' }'
        '404':
          description: Usuário não encontrado
  /api/accounts/authz/version/:
    get:
      operationId: accounts_authz_version_retrieve
      description: Retorna o número de versão de autorização do usuário autenticado.
        Usado EXCLUSIVAMENTE pelo frontend para invalidação de cache. Não representa
        permissões reais e não deve ser usado em decisões de autorização.
      summary: Versão de autorização do usuário autenticado
      tags:
      - 1 - Usuários
      security:
      - gppSessionAuth: []
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      responses:
        '200':
          description: Versão de autorização retornada com sucesso.
        '401':
          description: Não autenticado.
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: 'Autentica o usuário e cria uma sessão por aplicação `gpp_session_<app_context>`
        (ex: `gpp_session_PORTAL`). Requer `username`, `password` e `app_context`.'
      summary: Login via sessão
      tags:
      - 0 - Autenticação
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: joao.silva
                password:
                  type: string
                  example: senha123
                app_context:
                  type: string
                  example: PORTAL
              required:
              - username
              - password
              - app_context
      security:
      - portalAuth: []
      - cargaOrgLotAuth: []
      - acoesPngiAuth: []
      - {}
      responses:
        '200':
          description: Login realizado com sucesso
        '400':
          description: Credenciais ou app_context não informados
        '401':
          description: Credenciais inválidas
        '403':
          description: Usuário sem acesso à aplicação
  /api/accounts/logout/:
