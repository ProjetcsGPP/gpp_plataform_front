          type: integer
      required:
      - aplicacao_id
      - email
      - name
      - orgao
      - password
      - role_id
      - username
    UserPermissionOverride:
      type: object
      description: |-
        FASE-7 (Issue #20) — Serializer para UserPermissionOverride.

        Resolve o ImportError crítico que impedia o carregamento de views.py
        e quebrava o URL routing completo do Django (~135 testes afetados).

        Campos expostos:
          - id              : PK do override (read_only via ModelSerializer)
          - user            : FK para auth.User (PK inteira)
          - permission      : FK para auth.Permission (PK inteira)
          - mode            : 'grant' | 'revoke'
          - source          : origem do override (ex: 'admin manual') — opcional
          - reason          : justificativa para auditoria — opcional
          - created_at      : timestamp de criação (read_only)
          - updated_at      : timestamp da última atualização (read_only)
          - created_by      : usuário que criou (read_only — preenchido pela view via AuditableMixin)
          - updated_by      : último usuário que atualizou (read_only — idem)

        Validação:
          validate() impede coexistência de override 'grant' e 'revoke' para o
          mesmo par (user, permission), espelhando o clean() do model em nível DRF
          para garantir resposta 400 em vez de exceção não tratada.

        FIX (Issue #21):
          create() e update() sobrescritos para descartar created_by_name e
          updated_by_name injetados pelo AuditableMixin (campos inexistentes no
          model UserPermissionOverride) e mapear created_by_id/updated_by_id
          para as FKs created_by/updated_by do model.

        Referências: ADR-PERM-01, divergência D-04, Issue #18, Issue #20, Issue #21.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          description: Usuário ao qual o override se aplica.
        permission:
          type: integer
          description: Permissão Django (auth.Permission) que está sendo sobrescrita.
        mode:
          allOf:
          - $ref: '#/components/schemas/ModeEnum'
          description: |-
            'grant' adiciona a permissão ao usuário independentemente da role. 'revoke' retira a permissão mesmo que a role a conceda.

            * `grant` - Grant — conceder permissão extra
            * `revoke` - Revoke — retirar permissão da role
        source:
          type: string
          description: 'Origem do override (ex: ''admin manual'', ''integração XPTO'').
            Opcional.'
          maxLength: 200
        reason:
          type: string
          description: Justificativa detalhada para o override. Opcional, mas recomendada
            para auditoria.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: integer
          readOnly: true
          nullable: true
          description: Usuário que criou o override (auditoria).
        updated_by:
          type: integer
          readOnly: true
          nullable: true
          description: Último usuário a atualizar o override (auditoria).
      required:
      - created_at
      - created_by
      - id
      - mode
      - permission
      - updated_at
      - updated_by
      - user
